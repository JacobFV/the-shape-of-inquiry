rif" font-size="22" font-weight="700" fill="#111" text-anchor="middle">self-effect</text><text x="300" y="422" font-family="ui-monospace, Menlo, monospace" font-size="17" font-weight="400" fill="#666" text-anchor="middle">ρ = I(A; Oₙₑₓₜ | Oₚₐₛₜ) / H(Oₙₑₓₜ | Oₚₐₛₜ)</text></g><g><rect x="560" y="350" width="380" height="98" fill="#fff" stroke="#111" stroke-width="1.75"></rect><text x="750" y="386" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111" text-anchor="middle">epistemic valence</text><text x="750" y="422" font-family="ui-monospace, Menlo, monospace" font-size="17" font-weight="400" fill="#666" text-anchor="middle">E[H(Θ | h) − H(Θ | h, a, o)]</text></g><g><rect x="1010" y="350" width="380" height="98" fill="#fff" stroke="#111" stroke-width="1.75"></rect><text x="1200" y="386" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111" text-anchor="middle">creative compression</text><text x="1200" y="422" font-family="ui-monospace, Menlo, monospace" font-size="17" font-weight="400" fill="#666" text-anchor="middle">C = N · IG · ΔA · max(0, MDL(Mₜ) − MDL(Mₜ₊₁))</text></g><rect x="110" y="545" width="1280" height="86" fill="#111" stroke="#111" stroke-width="1.75"></rect><text x="750" y="598" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff" text-anchor="middle">Intelligence begins when making the world measurable enters the objective.</text></svg>
